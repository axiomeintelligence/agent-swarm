---
# Deploy Arcane orchestrator.
# Prerequisites: run site.yml first (Docker + SOPS).
#
# Setup:
#   cp -r inventory/example inventory/<deployment>
#   # Edit inventory/<deployment>/hosts and group_vars/servers.yml
#   ansible-playbook -i inventory/<deployment> arcane.yml
#
# Targeted re-runs:
#   --tags arcane        Redeploy Arcane only
#   --tags agent-swarm   Open Hermes + DevBot ports only
#   --tags teardown      Remove Arcane + agent-swarm ports (stops containers, deletes /opt/arcane, removes firewall rules)

- name: Deploy Arcane
  hosts: servers
  become: true
  tasks:
    - ansible.builtin.import_tasks: tasks/arcane.yml
      tags: arcane
    - ansible.builtin.import_tasks: tasks/agent-swarm.yml
      tags: agent-swarm
