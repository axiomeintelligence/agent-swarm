name: ${CONTAINER_NAME:-hermes}

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: ${CONTAINER_NAME:-hermes}
    restart: unless-stopped
    command: gateway run
    ports:
      - "${HOST_PORT:-8642}:8642"       # gateway API
      - "${DASHBOARD_PORT:-9119}:9119"  # dashboard (requires HERMES_DASHBOARD=1)
    volumes:
      - ./data:/opt/data
    env_file: .env
    environment:
      - HERMES_DASHBOARD=${HERMES_DASHBOARD:-1}
      - HERMES_DASHBOARD_INSECURE=${HERMES_DASHBOARD_INSECURE:-1}
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
