---
# Deploy Arcane orchestrator.
# Prerequisites: run site.yml first (Docker + SOPS).
#
# Setup:
#   cp vars/arcane.example.yml vars/arcane.yml
#   # Fill in secrets: openssl rand -hex 32
#   ansible-playbook -i inventory/hosts arcane.yml
#
# Targeted re-runs:
#   --tags arcane      Redeploy Arcane only
#   --tags teardown    Remove Arcane (stops containers, deletes /opt/arcane, removes firewall rule)

- name: Deploy Arcane
  hosts: servers
  become: true
  vars_files:
    - vars/arcane.yml
  tasks:
    - ansible.builtin.import_tasks: tasks/arcane.yml
      tags: arcane
