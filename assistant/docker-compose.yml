name: ${CONTAINER_NAME:-assistant}

services:
  hermes:
    image: ${ASSISTANT_IMAGE:-ghcr.io/axiomeintelligence/assistant:latest}
    build:
      context: ./hermes
    container_name: ${CONTAINER_NAME:-assistant}
    hostname: ${CONTAINER_NAME:-assistant}
    restart: unless-stopped
    depends_on:
      gbrain:
        condition: service_healthy
      gdrive-mcp:
        condition: service_started
    ports:
      - "${HOST_PORT:-8642}:8642"
      - "${DASHBOARD_PORT:-9119}:9119"    # dashboard UI (requires HERMES_DASHBOARD=1)
    volumes:
      - ./data/${CONTAINER_NAME:-assistant}/hermes:/opt/data
    networks:
      - assistant-net
    environment:
      # ── Dashboard ───────────────────────────────────────────────────────────
      - HERMES_DASHBOARD=${HERMES_DASHBOARD:-1}
      - HERMES_DASHBOARD_INSECURE=${HERMES_DASHBOARD_INSECURE:-1}             # skip OAuth gate — safe on Tailscale-only networks
      # ── AI provider ──────────────────────────────────────────────────────────
      - AI_PROVIDER=${AI_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # ── Messaging platforms ──────────────────────────────────────────────────
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_ALLOWED_USERS=${SLACK_ALLOWED_USERS:-}
      # ── Gmail IMAP/SMTP ──────────────────────────────────────────────────────
      - EMAIL_ADDRESS=${EMAIL_ADDRESS:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - EMAIL_IMAP_HOST=${EMAIL_IMAP_HOST:-imap.gmail.com}
      - EMAIL_IMAP_PORT=${EMAIL_IMAP_PORT:-993}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST:-smtp.gmail.com}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-587}
      - EMAIL_ALLOWED_USERS=${EMAIL_ALLOWED_USERS:-}
      - EMAIL_POLL_INTERVAL=${EMAIL_POLL_INTERVAL:-15}
      - TZ=${TZ:-UTC}

  gbrain:
    image: ${GBRAIN_IMAGE:-ghcr.io/axiomeintelligence/gbrain:latest}
    build:
      context: ./gbrain
      args:
        GBRAIN_REF: ${GBRAIN_REF:-main}
    container_name: ${CONTAINER_NAME:-assistant}-gbrain
    hostname: gbrain
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3131/health"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 6
    volumes:
      - ./data/${CONTAINER_NAME:-assistant}/gbrain:/data
    networks:
      - assistant-net
    environment:
      - OPENAI_API_KEY=${GBRAIN_OPENAI_API_KEY:-${OPENAI_API_KEY:-}}

  gdrive-mcp:
    image: ${GDRIVE_MCP_IMAGE:-ghcr.io/axiomeintelligence/gdrive-mcp:latest}
    build:
      context: ./gdrive-mcp
    container_name: ${CONTAINER_NAME:-assistant}-gdrive-mcp
    hostname: gdrive-mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    networks:
      - assistant-net
    environment:
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON:-}

networks:
  assistant-net:
    name: ${CONTAINER_NAME:-assistant}-net
