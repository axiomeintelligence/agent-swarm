name: Publish gbrain image

on:
  push:
    branches: [main]
    paths:
      - assistant/gbrain/**

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: assistant/gbrain
          push: true
          tags: |
            ghcr.io/axiomeintelligence/gbrain:latest
            ghcr.io/axiomeintelligence/gbrain:sha-${{ github.sha }}
