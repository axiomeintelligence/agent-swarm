# Arcane orchestrator vars.
# Copy to vars/arcane.yml (git-ignored) and fill in real values before running.
# Generate secrets with: openssl rand -hex 32
#
#   cp vars/arcane.example.yml vars/arcane.yml

# Generate with: openssl rand -hex 32
arcane_encryption_key: "<openssl rand -hex 32>"
arcane_jwt_secret: "<openssl rand -hex 32>"
# Optional:
# arcane_puid: 1000
# Optional:
#arcane_pgid: 1000
