---
# deploy-agent.yml — day-2 operations playbook.
# Clones or pulls both repos on the server and restarts the assistant stack.
#
# Prerequisites:
#   - Server provisioned via site.yml (Docker installed, Tailscale connected)
#   - .env created manually on the server at <compose_project_src>/.env
#
# Usage:
#   ansible-playbook -i inventory/<name> deploy-agent.yml
#
# Required vars (define in inventory group_vars/servers/agent_swarm.yml):
#   agent_swarm_repo     -- git remote URL for the agent-swarm (or derived) repo
#   agent_swarm_path     -- absolute path on server to clone/pull the repo into
#   mono_repo_url        -- git remote URL for the mono-repo
#   mono_repo_path       -- absolute path on server to clone/pull mono-repo into
#
# Optional vars:
#   mono_repo_owner      -- user:group to own mono_repo_path (default: omitted)
#   compose_project_src  -- full path to the compose project root
#                           (default: agent_swarm_path/assistant)

- name: Deploy agent-swarm assistant stack
  hosts: servers
  become: yes
  tasks:
    - name: Ensure agent-swarm repo directory exists
      file:
        path: "{{ agent_swarm_path }}"
        state: directory
        mode: "0755"

    - name: Clone or pull agent-swarm repo
      become: no
      git:
        repo: "{{ agent_swarm_repo }}"
        dest: "{{ agent_swarm_path }}"
        version: main
        update: yes
        accept_hostkey: yes
        force: yes

    - name: Ensure mono-repo directory exists with ownership
      file:
        path: "{{ mono_repo_path }}"
        state: directory
        mode: "0755"
        owner: "{{ mono_repo_owner.split(':')[0] }}"
        group: "{{ mono_repo_owner.split(':')[1] }}"
      when: mono_repo_owner is defined

    - name: Ensure mono-repo directory exists (no ownership)
      file:
        path: "{{ mono_repo_path }}"
        state: directory
        mode: "0755"
      when: mono_repo_owner is not defined

    - name: Clone or pull mono-repo
      become: no
      git:
        repo: "{{ mono_repo_url }}"
        dest: "{{ mono_repo_path }}"
        version: main
        update: yes
        accept_hostkey: yes

    - name: Set mono-repo ownership
      file:
        path: "{{ mono_repo_path }}"
        owner: "{{ mono_repo_owner.split(':')[0] }}"
        group: "{{ mono_repo_owner.split(':')[1] }}"
        recurse: yes
      when: mono_repo_owner is defined

    - name: Pull latest published images
      become: no
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_src | default(agent_swarm_path + '/assistant') }}"
        pull: always
        build: never
        state: present

    - name: Build local-only services and start full stack
      become: no
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_src | default(agent_swarm_path + '/assistant') }}"
        pull: never
        build: always
        services:
          - devbot-mcp
        state: present

    - name: Ensure full stack is running
      become: no
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_src | default(agent_swarm_path + '/assistant') }}"
        pull: never
        build: never
        state: present
