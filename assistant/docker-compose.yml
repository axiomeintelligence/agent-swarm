name: ${CONTAINER_NAME:-assistant}

services:
  hermes:
    image: ${ASSISTANT_IMAGE:-ghcr.io/axiomeintelligence/assistant:latest}
    build:
      context: ./hermes
    container_name: ${CONTAINER_NAME:-assistant}
    hostname: ${CONTAINER_NAME:-assistant}
    restart: unless-stopped
    command: hermes gateway run
    depends_on:
      gdrive-mcp:
        condition: service_started
    ports:
      # Hermes' gateway (telegram/slack/email connector) is outbound — it does NOT
      # serve HTTP. The only HTTP service exposed by this stack is the dashboard.
      - "${DASHBOARD_PORT:-9119}:9119"    # dashboard UI (requires HERMES_DASHBOARD=1 + basic-auth env vars)
    volumes:
      - ./data/${CONTAINER_NAME:-assistant}/hermes:/opt/data
      - ${MONO_REPO_PATH}/agent-swarm/config/assistant/.gbrain-data:/opt/gbrain-home
      - ${MONO_REPO_PATH}/agent-swarm/config/assistant/skills:/opt/data/skills/mono:ro
      # Whole mono repo (rw) — sync-brain needs the .git directory for `git pull`.
      # Brain content is read from /mono-repo/agent-swarm/config/assistant/brain inside.
      - ${MONO_REPO_PATH}:/mono-repo
    networks:
      - assistant-net
    environment:
      # ── Dashboard ───────────────────────────────────────────────────────────
      # Auth is mandatory for non-loopback binds (HERMES_DASHBOARD_INSECURE no
      # longer disables this). Set BASIC_AUTH_USERNAME + _PASSWORD in .env, or
      # configure OAuth with `hermes dashboard register`.
      - HERMES_DASHBOARD=${HERMES_DASHBOARD:-1}
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:-}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD:-}
      # ── AI provider ──────────────────────────────────────────────────────────
      - AI_PROVIDER=${AI_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # ── Messaging platforms ──────────────────────────────────────────────────
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_ALLOWED_USERS=${SLACK_ALLOWED_USERS:-}
      # ── Gmail IMAP/SMTP ──────────────────────────────────────────────────────
      - EMAIL_ADDRESS=${EMAIL_ADDRESS:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - EMAIL_IMAP_HOST=${EMAIL_IMAP_HOST:-imap.gmail.com}
      - EMAIL_IMAP_PORT=${EMAIL_IMAP_PORT:-993}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST:-smtp.gmail.com}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-587}
      - EMAIL_ALLOWED_USERS=${EMAIL_ALLOWED_USERS:-}
      - EMAIL_POLL_INTERVAL=${EMAIL_POLL_INTERVAL:-15}
      - TZ=${TZ:-UTC}
      # ── G-Brain ──────────────────────────────────────────────────────────────
      - GBRAIN_HOME=/opt/gbrain-home
      - SKILL_SYNC_INTERVAL=${SKILL_SYNC_INTERVAL:-300}
      - MONO_REPO_PATH=${MONO_REPO_PATH:-}

  gdrive-mcp:
    image: ${GDRIVE_MCP_IMAGE:-ghcr.io/axiomeintelligence/gdrive-mcp:latest}
    build:
      context: ./gdrive-mcp
    container_name: ${CONTAINER_NAME:-assistant}-gdrive-mcp
    hostname: gdrive-mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    networks:
      - assistant-net
    environment:
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON:-}

networks:
  assistant-net:
    name: ${CONTAINER_NAME:-assistant}-net
