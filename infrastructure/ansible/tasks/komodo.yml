- name: Allow Komodo Web UI on Tailscale interface
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: tailscale0
    protocol: tcp
    destination_port: "9120"
    jump: ACCEPT
    comment: Komodo Web UI — Tailscale only
  tags: komodo

- name: Persist iptables rules
  ansible.builtin.command:
    cmd: netfilter-persistent save
  changed_when: true
  tags: komodo

- name: Create Komodo directory
  ansible.builtin.file:
    path: /opt/komodo
    state: directory
    owner: cloud_user
    group: docker
    mode: '0750'
  tags: komodo

- name: Create Komodo backups directory
  ansible.builtin.file:
    path: /etc/komodo/backups
    state: directory
    owner: cloud_user
    group: docker
    mode: '0750'
  tags: komodo

- name: Write Komodo docker-compose.yml
  ansible.builtin.copy:
    dest: /opt/komodo/docker-compose.yml
    owner: cloud_user
    group: docker
    mode: '0640'
    content: |
      services:
        mongo:
          image: mongo
          labels:
            komodo.skip:
          command: --quiet --wiredTigerCacheSizeGB 0.25
          restart: unless-stopped
          env_file: ./compose.env
          volumes:
            - mongo-data:/data/db
            - mongo-config:/data/configdb
          environment:
            MONGO_INITDB_ROOT_USERNAME: ${KOMODO_DATABASE_USERNAME}
            MONGO_INITDB_ROOT_PASSWORD: ${KOMODO_DATABASE_PASSWORD}

        core:
          image: ghcr.io/moghtech/komodo-core:${COMPOSE_KOMODO_IMAGE_TAG:-2.2}
          init: true
          restart: unless-stopped
          depends_on:
            - mongo
          ports:
            - 9120:9120
          env_file: ./compose.env
          environment:
            KOMODO_DATABASE_ADDRESS: mongo:27017
          volumes:
            - keys:/config/keys
            - /etc/komodo/backups:/backups

      volumes:
        mongo-data:
        mongo-config:
        keys:
  tags: komodo

- name: Write Komodo compose.env from template
  ansible.builtin.template:
    src: komodo-compose.env.j2
    dest: /opt/komodo/compose.env
    owner: cloud_user
    group: cloud_user
    mode: '0600'
  tags: komodo

- name: Start Komodo stack via docker compose
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /opt/komodo
  become_user: cloud_user
  changed_when: true
  tags: komodo

# --- Teardown (--tags teardown) ---

- name: "[teardown] Stop Periphery service"
  ansible.builtin.systemd:
    name: periphery
    state: stopped
    enabled: false
  ignore_errors: true
  tags: teardown

- name: "[teardown] Remove Periphery binary and service"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/local/bin/periphery
    - /etc/systemd/system/periphery.service
  tags: teardown

- name: "[teardown] Reload systemd after removing Periphery"
  ansible.builtin.systemd:
    daemon_reload: true
  tags: teardown

- name: "[teardown] Stop and remove Komodo stack"
  ansible.builtin.command:
    cmd: docker compose down -v
    chdir: /opt/komodo
  become_user: cloud_user
  ignore_errors: true
  changed_when: true
  tags: teardown

- name: "[teardown] Remove Komodo directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /opt/komodo
    - /etc/komodo
  tags: teardown

- name: "[teardown] Remove Komodo iptables rule"
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: tailscale0
    protocol: tcp
    destination_port: "9120"
    jump: ACCEPT
    state: absent
  tags: teardown

- name: "[teardown] Persist iptables after removing Komodo rule"
  ansible.builtin.command:
    cmd: netfilter-persistent save
  changed_when: true
  tags: teardown
