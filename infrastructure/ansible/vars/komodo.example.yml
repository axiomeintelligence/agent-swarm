# Copy to vars/komodo.yml (git-ignored) and fill in real values before running.
# Generate each secret with: openssl rand -hex 32
#
#   cp vars/komodo.example.yml vars/komodo.yml
#   # Edit vars/komodo.yml — replace all placeholder values

komodo_database_password: "<mongo-password>"
komodo_jwt_secret: "<jwt-secret>"
komodo_webhook_secret: "<webhook-secret>"
komodo_admin_username: "admin"
komodo_admin_password: "<admin-password>"

# Resource Sync bootstrap — used by tasks/resource-sync.yml
# Points Komodo at the instance repo containing agent-stacks/komodo.toml
komodo_resource_sync_name: "<client-name>-instance"
komodo_instance_repo: "<your-org>/<your-instance-repo>"
komodo_instance_branch: "main"
komodo_resource_path: "agent-stacks/komodo.toml"
# Git account configured in Komodo Settings → Providers (required for private repos)
komodo_git_account: "<github-account-name>"

# Age private key for SOPS secret decryption on this server.
# Generate locally: age-keygen  (install: brew install age)
#
# The public key printed by age-keygen goes into the instance repo's .sops.yaml
# under creation_rules for this server's stacks. Keep only the PRIVATE key here.
#
# Example output from age-keygen:
#   # created: 2026-05-29T00:00:00Z
#   # public key: age1xxxx...
#   AGE-SECRET-KEY-1yyyy...
age_private_key: |
  # created: <timestamp>
  # public key: age1<your-public-key-here>
  AGE-SECRET-KEY-1<your-private-key-here>
